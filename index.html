<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />

    <title>OpenLabs ELMT</title>

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Horarios de laboratorios - OpenLabs ELMT"
    />

    <!-- Logo de la pestaña -->
    <link
      rel="icon"
      type="image/png"
      href="/OPEN-LABS-ELMT/asset/Logo.png?v=60"
    />
    <link
      rel="shortcut icon"
      type="image/png"
      href="/OPEN-LABS-ELMT/asset/Logo.png?v=60"
    />
    <link
      rel="apple-touch-icon"
      href="/OPEN-LABS-ELMT/asset/Logo.png?v=60"
    />

    <style>
      :root {
        --page-accent: #111827;
        --border-color: #d1d5db;
        --muted-text: #6b7280;
        --page-bg: #f9fafb;
        --card-bg: #ffffff;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: var(--page-bg);
      }

      .app-frame {
        width: 100%;
        height: 100vh;
        height: 100dvh;
        border: 0;
        display: block;
        background: #ffffff;
        opacity: 0;
        visibility: hidden;
      }

      .app-frame.visible {
        opacity: 1;
        visibility: visible;
      }

      .status-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--page-bg);
        font-family: Arial, Helvetica, sans-serif;
      }

      .status-screen.hidden {
        display: none;
      }

      .access-card {
        width: min(520px, 100%);
        padding: 32px 28px;
        border: 1px solid var(--border-color);
        border-radius: 18px;
        background: var(--card-bg);
        box-shadow: 0 18px 45px rgba(17, 24, 39, 0.12);
        text-align: center;
      }

      .access-logo {
        width: 82px;
        height: 82px;
        object-fit: contain;
        margin-bottom: 18px;
      }

      .access-card h1 {
        margin: 0 0 10px;
        color: var(--page-accent);
        font-size: 24px;
        line-height: 1.2;
      }

      .access-card p {
        margin: 0 0 18px;
        color: var(--muted-text);
        font-size: 15px;
        line-height: 1.5;
      }

      .button {
        appearance: none;
        border: 1px solid var(--page-accent);
        border-radius: 999px;
        padding: 12px 18px;
        background: var(--page-accent);
        color: #ffffff;
        font-size: 14px;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
      }

      .button.hidden,
      .small-note.hidden {
        display: none;
      }

      .small-note {
        margin-top: 18px !important;
        margin-bottom: 0 !important;
        font-size: 13px !important;
      }
    </style>
  </head>

  <body>
    <iframe
      id="openlabsFrame"
      class="app-frame"
      title="OpenLabs ELMT - Horarios de laboratorios"
      allowfullscreen
    ></iframe>

    <main id="statusScreen" class="status-screen" role="status" aria-live="polite">
      <section class="access-card">
        <img
          class="access-logo"
          src="/OPEN-LABS-ELMT/asset/Logo.png?v=60"
          alt="OpenLabs ELMT"
          onerror="this.style.display='none'"
        />

        <h1 id="statusTitle">Cargando OpenLabs ELMT...</h1>

        <p id="statusText">
          Estamos verificando si tu sesión UTEC está activa.
        </p>

        <button id="loginButton" class="button hidden" type="button">
          Ingresar con @utec.edu.pe
        </button>

        <p id="smallNote" class="small-note hidden">
          Después de iniciar sesión, volverás automáticamente a esta página.
        </p>
      </section>
    </main>

    <script>
      const APP_URL =
        "https://script.google.com/a/macros/utec.edu.pe/s/AKfycbx7WDZW0HvAEZ79w5z7VSRUh18phu_7eljeTzXnvofZW8Tnb1gY7zXYA9Cj8_F6m-gO/exec";

      const CHECK_TIMEOUT_MS = 2500;

      const iframe = document.getElementById("openlabsFrame");
      const statusScreen = document.getElementById("statusScreen");
      const statusTitle = document.getElementById("statusTitle");
      const statusText = document.getElementById("statusText");
      const loginButton = document.getElementById("loginButton");
      const smallNote = document.getElementById("smallNote");

      let appReady = false;

      function showApp() {
        appReady = true;
        iframe.classList.add("visible");
        statusScreen.classList.add("hidden");
      }

      function showLoginButton() {
        if (appReady) return;

        statusScreen.setAttribute("role", "alert");
        statusTitle.textContent = "Ingresa con tu cuenta @utec.edu.pe";
        statusText.textContent =
          "Para ver los horarios de laboratorios, inicia sesión con tu correo institucional UTEC.";

        loginButton.classList.remove("hidden");
        smallNote.classList.remove("hidden");
      }

      function buildLoginUrl() {
        const returnUrl =
          window.location.origin + window.location.pathname + "?auth=1";

        const appScriptLoginUrl = new URL(APP_URL);
        appScriptLoginUrl.searchParams.set("login", "1");
        appScriptLoginUrl.searchParams.set("return", returnUrl);

        const googleLoginUrl = new URL("https://accounts.google.com/AccountChooser");
        googleLoginUrl.searchParams.set("hd", "utec.edu.pe");
        googleLoginUrl.searchParams.set("continue", appScriptLoginUrl.toString());

        return googleLoginUrl.toString();
      }

      window.addEventListener("message", function (event) {
        const origin = event.origin || "";

        const isAppsScriptOrigin =
          origin === "https://script.google.com" ||
          origin === "https://script.googleusercontent.com" ||
          origin.endsWith(".googleusercontent.com");

        if (!isAppsScriptOrigin) return;

        if (event.data && event.data.type === "OPENLABS_READY") {
          showApp();
        }
      });

      loginButton.addEventListener("click", function () {
        window.location.assign(buildLoginUrl());
      });

      iframe.src = APP_URL;

      window.setTimeout(showLoginButton, CHECK_TIMEOUT_MS);
    </script>
  </body>
</html>
