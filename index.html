<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />

    <title>OpenLabs ELMT</title>

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Horarios de laboratorios - OpenLabs ELMT"
    />

    <!-- Logo de la pestaña -->
    <link
      rel="icon"
      type="image/png"
      href="/OPEN-LABS-ELMT/asset/Logo.png?v=31"
    />
    <link
      rel="shortcut icon"
      type="image/png"
      href="/OPEN-LABS-ELMT/asset/Logo.png?v=31"
    />
    <link
      rel="apple-touch-icon"
      href="/OPEN-LABS-ELMT/asset/Logo.png?v=31"
    />

    <style>
      :root {
        --page-accent: #111827;
        --border-color: #d1d5db;
        --muted-text: #6b7280;
        --page-bg: #f9fafb;
        --card-bg: #ffffff;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: var(--page-bg);
      }

      .app-frame {
        width: 100%;
        height: 100vh;
        height: 100dvh;
        border: 0;
        display: block;
        background: #ffffff;
      }

      .access-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        padding: 24px;
        background: rgba(249, 250, 251, 0.96);
        font-family: Arial, Helvetica, sans-serif;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition: opacity 180ms ease, visibility 180ms ease;
      }

      .access-overlay.visible {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }

      .access-card {
        width: min(520px, 100%);
        padding: 32px 28px;
        border: 1px solid var(--border-color);
        border-radius: 18px;
        background: var(--card-bg);
        box-shadow: 0 18px 45px rgba(17, 24, 39, 0.12);
        text-align: center;
      }

      .access-logo {
        width: 82px;
        height: 82px;
        object-fit: contain;
        margin-bottom: 18px;
      }

      .access-card h1 {
        margin: 0 0 10px;
        color: var(--page-accent);
        font-size: 24px;
        line-height: 1.2;
      }

      .access-card p {
        margin: 0 0 16px;
        color: var(--muted-text);
        font-size: 15px;
        line-height: 1.5;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
        margin-top: 20px;
      }

      .button {
        appearance: none;
        border: 1px solid var(--page-accent);
        border-radius: 999px;
        padding: 11px 16px;
        background: var(--page-accent);
        color: #ffffff;
        font-size: 14px;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
      }

      .button.secondary {
        background: #ffffff;
        color: var(--page-accent);
      }

      .small-note {
        margin-top: 18px !important;
        margin-bottom: 0 !important;
        font-size: 13px !important;
      }
    </style>
  </head>

  <body>
    <iframe
      id="openlabsFrame"
      class="app-frame"
      title="OpenLabs ELMT - Horarios de laboratorios"
      allowfullscreen
    ></iframe>

    <div
      id="accessOverlay"
      class="access-overlay"
      role="alert"
      aria-live="polite"
    >
      <div class="access-card">
        <img
          class="access-logo"
          src="/OPEN-LABS-ELMT/asset/Logo.png?v=31"
          alt="OpenLabs ELMT"
          onerror="this.style.display='none'"
        />

        <h1>Ingresa con tu cuenta @utec.edu.pe</h1>

        <p>
          Para poder ver los horarios, primero inicia sesión con tu correo
          institucional UTEC.
        </p>

        <div class="actions">
          <button id="loginButton" class="button" type="button">
            Ingresar con @utec.edu.pe
          </button>

          <button
            class="button secondary"
            type="button"
            onclick="window.location.reload()"
          >
            Recargar
          </button>
        </div>

        <p class="small-note">
          Si ya iniciaste sesión en otra pestaña, vuelve aquí y presiona
          “Recargar”.
        </p>
      </div>
    </div>

    <script>
      const APP_URL =
        "https://script.google.com/a/macros/utec.edu.pe/s/AKfycbx7WDZW0HvAEZ79w5z7VSRUh18phu_7eljeTzXnvofZW8Tnb1gY7zXYA9Cj8_F6m-gO/exec";

      const ACCESS_TIMEOUT_MS = 1500;

      const iframe = document.getElementById("openlabsFrame");
      const overlay = document.getElementById("accessOverlay");
      const loginButton = document.getElementById("loginButton");

      let appReady = false;

      function showAccessOverlay() {
        if (!appReady) {
          overlay.classList.add("visible");
        }
      }

      function hideAccessOverlay() {
        appReady = true;
        overlay.classList.remove("visible");
      }

      window.addEventListener("message", function (event) {
        const origin = event.origin || "";

        const isAppsScriptOrigin =
          origin === "https://script.google.com" ||
          origin === "https://script.googleusercontent.com" ||
          origin.endsWith(".googleusercontent.com");

        if (!isAppsScriptOrigin) return;

        if (event.data && event.data.type === "OPENLABS_READY") {
          hideAccessOverlay();
        }
      });

      iframe.src = APP_URL;

      window.setTimeout(showAccessOverlay, ACCESS_TIMEOUT_MS);

      loginButton.addEventListener("click", function () {
        const loginUrl = new URL(APP_URL);
        loginUrl.searchParams.set("login", "1");

        window.location.href = loginUrl.toString();
      });
    </script>
  </body>
</html>
