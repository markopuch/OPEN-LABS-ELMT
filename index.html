<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />

    <title>OpenLabs ELMT</title>

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Horarios de laboratorios - OpenLabs ELMT"
    />

    <!-- Favicons: coloca estos archivos en la raíz del repositorio -->
    <link rel="icon" href="./favicon.ico?v=300" sizes="any" />
    <link rel="shortcut icon" href="./favicon.ico?v=300" />
    <link
      rel="icon"
      type="image/png"
      sizes="48x48"
      href="./favicon-48x48.png?v=300"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./favicon-32x32.png?v=300"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="./favicon-16x16.png?v=300"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="./apple-touch-icon.png?v=300"
    />
    <link rel="manifest" href="./site.webmanifest?v=300" />

    <!-- Fallback: usa tu logo dentro de asset si el navegador no toma favicon.ico -->
    <link
      rel="icon"
      type="image/png"
      href="./asset/Logo.png?v=300"
    />

    <style>
      :root {
        --page-accent: #111827;
        --border-color: #d1d5db;
        --muted-text: #6b7280;
        --page-bg: #f9fafb;
        --card-bg: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: var(--page-bg);
      }

      .app-frame {
        width: 100%;
        height: 100vh;
        height: 100dvh;
        border: 0;
        display: block;
        background: #ffffff;

        /*
          Importante:
          El iframe empieza oculto para que NO se vea la pantalla rota de Google
          cuando el usuario no tiene sesión UTEC activa.
        */
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .app-frame.visible {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }

      .status-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--page-bg);
        font-family: Arial, Helvetica, sans-serif;
      }

      .status-screen.hidden {
        display: none;
      }

      .access-card {
        width: min(520px, 100%);
        padding: 32px 28px;
        border: 1px solid var(--border-color);
        border-radius: 18px;
        background: var(--card-bg);
        box-shadow: 0 18px 45px rgba(17, 24, 39, 0.12);
        text-align: center;
      }

      .access-logo {
        width: 82px;
        height: 82px;
        object-fit: contain;
        margin-bottom: 18px;
      }

      .access-card h1 {
        margin: 0 0 10px;
        color: var(--page-accent);
        font-size: 24px;
        line-height: 1.2;
      }

      .access-card p {
        margin: 0 0 16px;
        color: var(--muted-text);
        font-size: 15px;
        line-height: 1.5;
      }

      .button {
        appearance: none;
        border: 1px solid var(--page-accent);
        border-radius: 999px;
        padding: 11px 16px;
        background: var(--page-accent);
        color: #ffffff;
        font-size: 14px;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
      }

      .button.hidden,
      .small-note.hidden {
        display: none;
      }

      .button:hover {
        background: #374151;
      }

      .small-note {
        margin-top: 18px !important;
        margin-bottom: 0 !important;
        font-size: 13px !important;
      }
    </style>
  </head>

  <body>
    <iframe
      id="openlabsFrame"
      class="app-frame"
      title="OpenLabs ELMT - Horarios de laboratorios"
      allowfullscreen
    ></iframe>

    <main
      id="statusScreen"
      class="status-screen"
      role="status"
      aria-live="polite"
    >
      <section class="access-card">
        <img
          class="access-logo"
          src="./asset/Logo.png?v=300"
          alt="OpenLabs ELMT"
          onerror="this.style.display='none'"
        />

        <h1 id="statusTitle">Cargando OpenLabs ELMT...</h1>

        <p id="statusText">
          Estamos verificando si tu sesión UTEC está activa.
        </p>

        <button
          id="reloadButton"
          class="button hidden"
          type="button"
          onclick="window.location.reload()"
        >
          Recargar página
        </button>

        <p id="smallNote" class="small-note hidden">
          Inicia sesión en Chrome con tu cuenta institucional
          <strong>@utec.edu.pe</strong> y luego recarga esta página.
        </p>
      </section>
    </main>

    <script>
      const APP_URL =
        "https://script.google.com/a/macros/utec.edu.pe/s/AKfycbx7WDZW0HvAEZ79w5z7VSRUh18phu_7eljeTzXnvofZW8Tnb1gY7zXYA9Cj8_F6m-gO/exec";

      /*
        Este tiempo solo controla cuándo cambiar de:
        "Cargando OpenLabs ELMT..."
        a:
        "Ingresa con tu cuenta @utec.edu.pe"

        El iframe ya está oculto desde el inicio, así que la pantalla rota de Google
        no debería verse.
      */
      const LOGIN_MESSAGE_DELAY_MS = 8000;

      const iframe = document.getElementById("openlabsFrame");
      const statusScreen = document.getElementById("statusScreen");
      const statusTitle = document.getElementById("statusTitle");
      const statusText = document.getElementById("statusText");
      const reloadButton = document.getElementById("reloadButton");
      const smallNote = document.getElementById("smallNote");

      let appReady = false;

      function showApp() {
        appReady = true;
        iframe.classList.add("visible");
        statusScreen.classList.add("hidden");
      }

      function showLoginMessage() {
        if (appReady) return;

        statusScreen.setAttribute("role", "alert");

        statusTitle.textContent = "Ingresa con tu cuenta @utec.edu.pe";

        statusText.textContent =
          "Para poder ver los horarios de laboratorios, inicia sesión en Chrome con tu correo institucional UTEC y luego recarga esta página.";

        reloadButton.classList.remove("hidden");
        smallNote.classList.remove("hidden");
      }

      window.addEventListener("message", function (event) {
        const origin = event.origin || "";

        const isAppsScriptOrigin =
          origin === "https://script.google.com" ||
          origin === "https://script.googleusercontent.com" ||
          origin.endsWith(".googleusercontent.com");

        if (!isAppsScriptOrigin) return;

        if (event.data && event.data.type === "OPENLABS_READY") {
          showApp();
        }
      });

      iframe.src = APP_URL;

      window.setTimeout(showLoginMessage, LOGIN_MESSAGE_DELAY_MS);
    </script>
  </body>
</html>
